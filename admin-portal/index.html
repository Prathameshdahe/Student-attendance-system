<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Attendance — BVCOE Admin</title>
<meta name="description" content="Real-time campus attendance monitoring dashboard for Bharati Vidyapeeth College of Engineering, Pune." />
<link rel="icon" type="image/png" href="logo_crest.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #f8fafc;
    --bg2:        #ffffff;
    --surface:    #ffffff;
    --surface2:   #f1f5f9;
    --border:     #e2e8f0;
    --border2:    #cbd5e1;
    --indigo:     #334155;
    --indigo-d:   #0f172a;
    --indigo-glow:rgba(15,23,42,0.08);
    --emerald:    #10b981;
    --emerald-glow:rgba(16,185,129,0.1);
    --amber:      #f59e0b;
    --amber-glow: rgba(245,158,11,0.1);
    --red:        #ef4444;
    --red-glow:   rgba(239,68,68,0.1);
    --cyan:       #0ea5e9;
    --text:       #0f172a;
    --text2:      #475569;
    --text3:      #94a3b8;
    --font:       'Inter', sans-serif;
    --mono:       'JetBrains Mono', monospace;
    --r:          12px;
    --r-sm:       6px;
    --trans:      all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .ambient { display: none; }

  /* ── LOGIN ── */
  .login-wrap { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
  .login-left {
    background: linear-gradient(135deg, var(--indigo-d), var(--indigo));
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 3rem; text-align: center; color: white;
  }
  .brand-logo-img { width: 90px; height: 90px; object-fit: contain; margin-bottom: 2rem; opacity: 0.85; filter: grayscale(10%); }
  .login-left h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 1rem; }
  .login-left p { font-size: 1rem; opacity: 0.9; max-width: 300px; line-height: 1.6; }

  .glass-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--r);
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
  }

  .login-right {
    display: flex; align-items: center; justify-content: center; padding: 3rem;
    background: var(--bg2);
  }
  .login-card { width: 100%; max-width: 400px; }
  .login-card h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
  .login-card .sub { color: var(--text2); font-size: 0.95rem; margin-bottom: 2rem; }

  label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .input-wrap { margin-bottom: 1.25rem; }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 0.75rem 1rem;
    background: var(--bg); border: 1px solid var(--border2);
    border-radius: var(--r-sm); color: var(--text);
    font-family: var(--font); font-size: 0.95rem; outline: none; transition: var(--trans);
  }
  input:focus { border-color: var(--indigo); box-shadow: 0 0 0 2px var(--indigo-glow); background: var(--surface); }
  input::placeholder { color: var(--text3); }

  .btn-primary {
    width: 100%; padding: 0.85rem;
    background: var(--indigo);
    color: white; border: none; border-radius: var(--r-sm);
    font-family: var(--font); font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: var(--trans);
  }
  .btn-primary:hover { background: var(--indigo-d); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .err-msg {
    background: #fef2f2; border: 1px solid #f87171;
    color: var(--red); padding: 0.8rem 1rem; border-radius: var(--r-sm);
    font-size: 0.9rem; margin-bottom: 1.5rem; font-weight: 500;
  }

  /* ── DASHBOARD SHELL ── */
  .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 2rem; height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; color: var(--text); }
  .topbar-brand img { width: 28px; height: 28px; filter: brightness(0.2); }
  .topbar-sep { width: 1px; height: 20px; background: var(--border2); margin: 0 1.25rem; }
  .topbar-title { font-size: 0.9rem; font-weight: 500; color: var(--text2); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }

  .live-beacon {
    display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
  }
  .live-beacon.live { background: #ecfdf5; border: 1px solid #6ee7b7; color: var(--emerald); }
  .live-beacon.offline { background: #fef2f2; border: 1px solid #fca5a5; color: var(--red); }
  .beacon-dot { width: 6px; height: 6px; border-radius: 50%; }
  .live-beacon.live .beacon-dot { background: var(--emerald); }
  .live-beacon.offline .beacon-dot { background: var(--red); }

  .user-chip { display: flex; align-items: center; gap: 8px; padding: 4px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; font-weight: 500; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--indigo); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }

  .btn-logout { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; font-family: var(--font); font-size: 0.8rem; font-weight: 500; color: var(--text2); cursor: pointer; transition: var(--trans); }
  .btn-logout:hover { border-color: var(--red); color: var(--red); background: #fef2f2; }

  /* ── MAIN LAYOUT ── */
  .main-content {
    flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem;
  }

  /* ── PANELS ── */
  .panel {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: var(--r);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-header {
    padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; background: var(--surface2);
  }
  .panel-title { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .panel-meta { font-size: 0.75rem; color: var(--text3); }

  /* ── OCCUPANCY BAR ── */
  .occupancy-wrap { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .occupancy-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .occupancy-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .occupancy-fill { height: 100%; border-radius: 4px; background: var(--indigo); transition: width 0.5s ease; }

  /* ── METRICS ROW ── */
  .metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); background: var(--surface2); }
  .metric-cell { padding: 1rem; border-right: 1px solid var(--border); text-align: center; }
  .metric-cell:last-child { border-right: none; }
  .metric-val { font-size: 1.5rem; font-weight: 700; line-height: 1; margin-bottom: 4px; color: var(--text); }
  .metric-lbl { font-size: 0.7rem; font-weight: 600; color: var(--text3); text-transform: uppercase; }

  /* ── LIVE FEED ── */
  .feed-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; max-height: calc(100vh - 280px); }
  .feed-list::-webkit-scrollbar { width: 6px; }
  .feed-list::-webkit-scrollbar-track { background: transparent; }
  .feed-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .feed-item {
    padding: 0.75rem; border-radius: var(--r-sm);
    border: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: center; gap: 10px;
  }
  .feed-time { font-size: 0.75rem; color: var(--text3); min-width: 65px; text-align: center; }
  .feed-name { font-size: 0.85rem; font-weight: 600; flex: 1; }
  .feed-pill {
    padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  }
  .feed-pill.in { background: #dbeafe; color: var(--indigo-d); }
  .feed-pill.out { background: #d1fae5; color: var(--emerald); }
  .feed-pill.exit { background: #fef3c7; color: var(--amber); }
  
  .empty-feed { text-align: center; padding: 2rem; color: var(--text3); font-size: 0.9rem; }

  /* ── ROSTER TABLE ── */
  table { width: 100%; border-collapse: collapse; }
  th { padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem; font-weight: 600; color: var(--text3); background: var(--surface2); border-bottom: 1px solid var(--border); }
  td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  tr:last-child td { border-bottom: none; }

  .roster-name { font-weight: 600; margin-bottom: 2px; }
  .roster-meta { font-size: 0.75rem; color: var(--text3); }
  .time-chip { font-family: var(--mono); font-size: 0.8rem; background: var(--bg); border: 1px solid var(--border2); padding: 2px 6px; border-radius: 4px; }
  .time-chip.blank { color: var(--text3); background: transparent; border-color: transparent; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
  .badge-pending { background: var(--bg); border: 1px solid var(--border); color: var(--text3); }
  .badge-in      { background: #dbeafe; color: var(--indigo-d); border: 1px solid #bfdbfe; }
  .badge-out     { background: #d1fae5; color: var(--emerald); border: 1px solid #a7f3d0; }

  /* ── ACTION BUTTONS ── */
  .btn-view { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2); background: white; color: var(--text2); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: 0.15s; }
  .btn-view:hover { border-color: var(--indigo); color: var(--indigo); background: #eff6ff; }

  /* ── EXIT REQUEST PANEL ── */
  .exit-panel { border-color: #fcd34d; }
  .exit-header { background: #fffcf2; border-bottom: 1px solid #fde68a; }
  .exit-card { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .exit-name { font-weight: 600; font-size: 0.9rem; }
  .exit-reason { font-size: 0.85rem; color: var(--text2); margin-top: 2px; }
  .exit-time { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }
  .exit-actions { display: flex; gap: 8px; }

  .btn-approve, .btn-deny {
    padding: 6px 12px; border-radius: 4px; border: none; font-size: 0.8rem; font-weight: 600; cursor: pointer;
  }
  .btn-approve { background: var(--emerald); color: white; }
  .btn-approve:hover { background: #047857; }
  .btn-deny { background: white; color: var(--text2); border: 1px solid var(--border2); }
  .btn-deny:hover { background: #fee2e2; color: var(--red); border-color: #fca5a5; }

  /* ── TOAST NOTIFICATIONS ── */
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast {
    display: flex; align-items: flex-start; gap: 10px; padding: 1rem; border-radius: var(--r-sm);
    background: white; border: 1px solid var(--border2); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    min-width: 250px; flex-direction: row;
  }
  .toast-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.9rem; }
  .toast.success .toast-icon { background: #d1fae5; color: var(--emerald); }
  .toast.warning .toast-icon { background: #fef3c7; color: var(--amber); }
  .toast.error .toast-icon { background: #fee2e2; color: var(--red); }
  .toast.info .toast-icon { background: #dbeafe; color: var(--indigo); }
  .toast-content { flex: 1; }
  .toast-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
  .toast-msg { font-size: 0.8rem; color: var(--text2); }
  .toast-close { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px; }

  /* ── STUDENT MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(17,24,39,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 2rem;
  }
  .modal {
    background: white; border-radius: var(--r); width: 100%; max-width: 500px; overflow: hidden;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; flex-direction: column;
  }
  .modal-top { padding: 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .modal-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--indigo); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
  .modal-name { font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .modal-meta { font-size: 0.85rem; color: var(--text2); }
  .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .modal-body { padding: 1.5rem; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .stat-box { background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 1rem; }
  .stat-box-label { font-size: 0.75rem; color: var(--text3); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .stat-box-val { font-size: 1.1rem; font-weight: 600; color: var(--text); }
  
  .btn-dl { padding: 6px 12px; background: var(--indigo); color: white; border: none; border-radius: 4px; font-weight: 500; cursor: pointer; }
  .btn-dl:hover { background: var(--indigo-d); }
  .btn-close { width: 30px; height: 30px; border-radius: 4px; background: white; color: var(--text2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .btn-close:hover { background: #f3f4f6; }

  @media (max-width: 1024px) {
    .main-content { grid-template-columns: 1fr; }
    .login-wrap { grid-template-columns: 1fr; }
    .login-left { display: none; }
  }

  /* ── TAB BAR ─────────────────────────────────────────────────────────── */
  .tab-bar {
    display: flex; gap: 0; padding: 0 2rem; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .tab-btn {
    padding: 1rem 1.5rem; font-family: var(--font); font-size: 0.9rem; font-weight: 600; color: var(--text2);
    background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--indigo); border-bottom-color: var(--indigo); }

  /* ── ANALYTICS ──────────────────────────────────────────────────────── */
  .analytics-page { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
  .analytics-controls { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; }
  .date-group { display: flex; flex-direction: column; gap: 6px; }
  .date-group label { font-size: 0.8rem; font-weight: 600; color: var(--text2); }
  .date-input { padding: 0.5rem 0.75rem; border: 1px solid var(--border2); border-radius: var(--r-sm); font-size: 0.9rem; outline: none; }
  .date-input:focus { border-color: var(--indigo); }
  
  .btn-refresh { padding: 0.5rem 1rem; background: var(--indigo); color: white; border: none; border-radius: var(--r-sm); font-weight: 600; cursor: pointer; }
  .btn-refresh:hover { background: var(--indigo-d); }
  .btn-refresh:disabled { opacity: 0.6; }
  .toggle-btn { padding: 0.5rem 0.75rem; background: white; border: 1px solid var(--border2); color: var(--text2); border-radius: var(--r-sm); font-size: 0.85rem; cursor: pointer; }
  .toggle-btn:hover { background: var(--bg); }

  .student-analytics-card {
    background: white; border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); overflow: hidden;
  }
  .sac-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; }
  .sac-info { display: flex; align-items: center; gap: 12px; }
  .sac-avatar { width: 40px; height: 40px; background: var(--bg); color: var(--text2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid var(--border); }
  .sac-name { font-weight: 600; font-size: 0.95rem; }
  .sac-meta { font-size: 0.8rem; color: var(--text2); }
  .sac-stats { display: flex; gap: 1.5rem; }
  .sac-stat { text-align: right; }
  .sac-stat-val { font-size: 1.2rem; font-weight: 700; }
  .sac-stat-lbl { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; }
  .sac-bar-wrap { padding: 0 1.5rem 1rem; }
  .sac-bar-track { height: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .sac-bar-fill { height: 100%; background: var(--indigo); border-radius: 4px; }
  .sac-bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text2); margin-top: 4px; }
  
  .sac-records { border-top: 1px solid var(--border); }
  .sac-record-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; padding: 0.5rem 1.5rem; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
  .sac-record-row:last-child { border-bottom: none; }
  .sac-record-row.header { background: var(--surface2); font-weight: 600; font-size: 0.8rem; color: var(--text2); }
  .pct-high { color: var(--emerald); font-weight: 600; }
  .pct-mid  { color: var(--amber); font-weight: 600; }
  .pct-low  { color: var(--red); font-weight: 600; }
</style>
</head>
<body>
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_BASE = "https://kiwi-smart-attendance-api.onrender.com";
const WEB_PORTAL_HEADERS = {
  "X-KIWI-Client-Type": "web-portal",
  "X-KIWI-Device-ID": "admin-portal-browser"
};

function portalHeaders(token = null, extra = {}) {
  const headers = { ...WEB_PORTAL_HEADERS, ...extra };
  if (token) headers.Authorization = `Bearer ${token}`;
  return headers;
}

async function readApiError(response, fallback) {
  try {
    const payload = await response.json();
    return payload?.detail || payload?.message || fallback;
  } catch {
    return fallback;
  }
}

// ─── API LAYER ───────────────────────────────────────────────────────────────
async function apiLogin(email, password) {
  const r = await fetch(`${API_BASE}/auth/login`, {
    method: "POST",
    headers: portalHeaders(null, { "Content-Type": "application/json" }),
    body: JSON.stringify({ email, password })
  });
  if (!r.ok) throw new Error(await readApiError(r, "Could not sign in to the Render API."));
  return r.json();
}
async function apiFetchStudents(token) {
  const r = await fetch(`${API_BASE}/students`, { headers: portalHeaders(token) });
  if (!r.ok) throw new Error(await readApiError(r, "Failed to load students"));
  return r.json();
}
async function apiFetchLiveToday(token) {
  const r = await fetch(`${API_BASE}/attendance/live/today`, { headers: portalHeaders(token) });
  if (!r.ok) throw new Error(await readApiError(r, "Failed to load live attendance"));
  return r.json();
}
async function apiFetchExitRequests(token) {
  const r = await fetch(`${API_BASE}/attendance/exit-requests/pending`, { headers: portalHeaders(token) });
  if (!r.ok) throw new Error(await readApiError(r, "Failed to load pending exit requests"));
  return r.json();
}
async function apiFetchExitHistory(token, studentId = null, limit = 20) {
  const params = new URLSearchParams({ limit: String(limit) });
  if (studentId) params.set("student_id", studentId);
  const r = await fetch(`${API_BASE}/attendance/exit-requests/history?${params.toString()}`, {
    headers: portalHeaders(token)
  });
  if (!r.ok) throw new Error(await readApiError(r, "Failed to load exit history"));
  return r.json();
}
async function apiFetchGeofenceEvents(token, studentId = null, limit = 20) {
  const params = new URLSearchParams({ limit: String(limit) });
  if (studentId) params.set("student_id", studentId);
  const r = await fetch(`${API_BASE}/attendance/geofence-events?${params.toString()}`, {
    headers: portalHeaders(token)
  });
  if (!r.ok) throw new Error(await readApiError(r, "Failed to load geofence alerts"));
  return r.json();
}
async function apiResolveExitRequest(token, requestId, action) {
  const r = await fetch(`${API_BASE}/attendance/exit-requests/${requestId}/resolve`, {
    method: "POST",
    headers: portalHeaders(token, { "Content-Type": "application/json" }),
    body: JSON.stringify({ action })
  });
  if (!r.ok) throw new Error(await readApiError(r, "Failed to resolve exit request"));
  return await r.json();
}

async function apiFetchAnalytics(token, fromDate, toDate) {
  let url = `${API_BASE}/attendance/analytics/summary`;
  const params = [];
  if (fromDate) params.push(`from_date=${fromDate}`);
  if (toDate)   params.push(`to_date=${toDate}`);
  if (params.length) url += '?' + params.join('&');
  const r = await fetch(url, { headers: portalHeaders(token) });
  if (!r.ok) throw new Error(await readApiError(r, "Failed to fetch analytics"));
  return await r.json();
}

// ─── ANIMATED COUNTER HOOK ────────────────────────────────────────────────────
function useAnimatedCounter(target, duration = 700) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = null;
    const initial = 0;
    const step = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(Math.round(initial + (target - initial) * eased));
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target]);
  return val;
}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((type, title, msg) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, type, title, msg }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4500);
  }, []);
  const removeToast = useCallback((id) => setToasts(p => p.filter(t => t.id !== id)), []);
  return { toasts, addToast, removeToast };
}

// ─── PDF DOWNLOAD ─────────────────────────────────────────────────────────────
function downloadPDF(student, record, exitHistory = [], geofenceHistory = []) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  // Header Ribbon
  doc.setFillColor(51, 65, 85);
  doc.rect(0, 0, 210, 32, "F");
  
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18); doc.setFont(undefined, "bold");
  doc.text("Daily Attendance & Activity Report", 14, 16);
  
  doc.setFontSize(9); doc.setFont(undefined, "normal");
  doc.text("Bharati Vidyapeeth College of Engineering, Pune", 14, 24);
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')}`, 120, 24);
  
  // Student Metadata
  doc.setTextColor(15, 23, 42);
  doc.setFontSize(14); doc.setFont(undefined, "bold");
  doc.text(student.name, 14, 45);
  
  doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.setTextColor(71, 85, 105);
  doc.text(`Roll No: ${student.roll}`, 14, 52);
  doc.text(`Email: ${student.email}`, 14, 58);
  doc.text(`Division: ${student.division}`, 14, 64);
  
  doc.text(`PRN: ${student.prn || 'N/A'}`, 100, 52);
  doc.text(`Mobile: ${student.mobile_number || 'N/A'}`, 100, 58);
  
  // Attendance Block
  const status = record ? record.status : "ABSENT";
  const today = new Date().toISOString().split("T")[0];
  
  doc.autoTable({
    startY: 72,
    head: [['Date', 'Check In', 'Check Out', 'Status']],
    body: [
      [today, record?.time_in || "—", record?.time_out || "—", status]
    ],
    headStyles: { fillColor: [241, 245, 249], textColor: [71, 85, 105], fontStyle: 'bold' },
    bodyStyles: { textColor: [15, 23, 42] },
    theme: 'grid',
    margin: { left: 14, right: 14 }
  });
  
  let currentY = doc.lastAutoTable.finalY + 15;
  
  // Exit Requests Table
  if (exitHistory.length > 0) {
    doc.setFontSize(12); doc.setFont(undefined, "bold"); doc.setTextColor(15, 23, 42);
    doc.text("Exit Request History", 14, currentY);
    
    const exitBody = exitHistory.map(req => [
      req.time || '—',
      req.reason || '—',
      req.status || '—',
      req.resolved_by_name || '—'
    ]);
    
    doc.autoTable({
      startY: currentY + 5,
      head: [['Time', 'Reason', 'Status', 'Resolved By']],
      body: exitBody,
      headStyles: { fillColor: [248, 250, 252], textColor: [71, 85, 105] },
      theme: 'grid',
    });
    currentY = doc.lastAutoTable.finalY + 15;
  }
  
  // Geofence Events Table
  if (geofenceHistory.length > 0) {
    doc.setFontSize(12); doc.setFont(undefined, "bold"); doc.setTextColor(15, 23, 42);
    doc.text("Geofence Events Log", 14, currentY);
    
    const geoBody = geofenceHistory.map(ev => [
      ev.time || '—',
      ev.event_type || '—',
      ev.note || '—'
    ]);
    
    doc.autoTable({
      startY: currentY + 5,
      head: [['Time', 'Event Type', 'Note/Location']],
      body: geoBody,
      headStyles: { fillColor: [248, 250, 252], textColor: [71, 85, 105] },
      theme: 'grid',
    });
    currentY = doc.lastAutoTable.finalY + 15;
  }
  
  // Signature Line
  currentY = Math.max(currentY + 20, 240);
  if (currentY > 280) { doc.addPage(); currentY = 40; }
  
  doc.setFontSize(8); doc.setTextColor(148, 163, 184);
  doc.text("_________________________", 130, currentY);
  doc.text("Authorized Faculty Signature", 133, currentY + 6);
  
  doc.save(`Attendance_${student.roll}_${today}.pdf`);
}

  const occupancyPct = totalStudents > 0 ? (active / totalStudents) * 100 : 0;

  const loadData = useCallback(async () => {

      const [stds, recs, exits, history, alerts] = await Promise.all([
        apiFetchStudents(session.token),
        apiFetchLiveToday(session.token),
        apiFetchExitRequests(session.token),
        apiFetchExitHistory(session.token, null, 10),
        apiFetchGeofenceEvents(session.token, null, 10)
      ]);
      setStudents(stds);
      setRecords(recs);

      // Toast if new exit request arrived
      if (exits.length > prevExitCount.current && prevExitCount.current >= 0) {
        const newReq = exits[0];
        if (newReq) addToast("warning", "Exit Request", `${newReq.name} (${newReq.roll}) — ${newReq.reason}`);
      }
      prevExitCount.current = exits.length;
      setExitRequests(exits);
      setRequestHistory(history);
      setGeofenceEvents(alerts);
      setLastSync(new Date());
      setIsOnline(true);
      setLoading(false);
    } catch (e) {
      setIsOnline(false);
      setLoading(false);
    }
  }, [session.token, addToast]);

  useEffect(() => {

                    <div className="feed-time">{item.time || '--'}</div>
                    <div style={{ flex: 1 }}>
                      <div className="feed-name">{item.name || 'Student'}</div>
                      <div className="roster-meta">{item.reason}</div>
                    </div>
                    <span className={`feed-pill ${item.status === 'APPROVED' ? 'out' : item.status === 'DENIED' ? 'exit' : 'in'}`}>
                      {item.status_label || item.status}
                    </span>
                  </div>
                ))
              )}
            </div>
          </div>

          <div className="panel">
            <div className="panel-header">
              <div className="panel-title">Geofence Alerts</div>
              <div className="panel-meta">{geofenceEvents.length} recent</div>
            </div>
            <div style={{ padding: "1rem", display: "flex", flexDirection: "column", gap: "0.75rem" }}>
              {geofenceEvents.length === 0 ? (
                <div className="empty-feed" style={{ padding: "1rem" }}>No geofence alerts recorded.</div>
              ) : (
                geofenceEvents.map(item => (
                  <div key={item.id} className="feed-item">
                    <div className="feed-time">{item.time || '--'}</div>
                    <div style={{ flex: 1 }}>
                      <div className="feed-name">{item.name || 'Student'}</div>
                      <div className="roster-meta">{item.note || item.event_type}</div>
                    </div>
                    <span className={`feed-pill ${item.event_type === 'EXIT' ? 'exit' : 'in'}`}>
                      {item.event_type}
                    </span>
                  </div>
                ))
              )}
            </div>
          </div>

          {/* Roster */}
          <div className="panel">
            <div className="panel-header">
              <div className="panel-title">Daily Roster</div>
              <div className="panel-meta">Auto-refreshing · 5s</div>
            </div>
            {loading && students.length === 0 ? (
              <div style={{ padding: "3rem", textAlign: "center", color: "var(--text3)" }}>Loading roster…</div>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Status</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Report</th>
                  </tr>
                </thead>
                <tbody>
                  {students.map(s => {
                    const rec = records.find(r => r.student_id === s.id);
                    const status = !rec ? 'PENDING' : rec.status;
                    const initials = s.name.split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
                    return (
                      <tr key={s.id}>
                        <td>
                          <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                            <div style={{ width: 34, height: 34, borderRadius: 8, background: "linear-gradient(135deg, var(--indigo), #818cf8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.7rem", fontWeight: 700, flexShrink: 0 }}>{initials}</div>
                            <div>
                              <div className="roster-name">{s.name}</div>
                              <div className="roster-meta">{s.roll} · Div {s.division}</div>
                            </div>
                          </div>
                        </td>
                        <td>
                          <span className={`badge ${status === 'PENDING' ? 'badge-pending' : status === 'IN' ? 'badge-in' : 'badge-out'}`}>
                            <span className="badge-dot" />
                            {status === 'PENDING' ? 'Pending' : status === 'IN' ? 'On Campus' : 'Departed'}
                          </span>
                        </td>
                        <td><span className={`time-chip ${!rec?.time_in ? 'blank' : ''}`}>{rec?.time_in || '--:--'}</span></td>
                        <td><span className={`time-chip ${!rec?.time_out ? 'blank' : ''}`}>{rec?.time_out || '--:--'}</span></td>
                        <td>
                          <button className="btn-view" onClick={() => openStudentModal(s, rec)}>View</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}

            {/* Metrics */}
            <div className="metrics-row">
              <div className="metric-cell">
                <div className="metric-val">{cntTotal}</div>
                <div className="metric-lbl">Total Scanned</div>
              </div>
              <div className="metric-cell">
                <div className="metric-val">{cntActive}</div>
                <div className="metric-lbl">On Campus</div>
              </div>
              <div className="metric-cell">
                <div className="metric-val">{cntDeparted}</div>
                <div className="metric-lbl">Departed</div>
              </div>
            </div>
          </div>
        </div>
      </div>}

      {/* ── ANALYTICS TAB ───────────────────────────────────────────────── */}
      {activeTab === 'analytics' && (
        <div className="analytics-page">
          {/* Controls */}
          <div className="analytics-controls">
            <div className="date-group">
              <label>From Date</label>
              <input type="date" className="date-input" value={fromDate} onChange={e => setFromDate(e.target.value)} />
            </div>
            <div className="date-group">
              <label>To Date</label>
              <input type="date" className="date-input" value={toDate} onChange={e => setToDate(e.target.value)} />
            </div>
            <button className="btn-refresh" onClick={loadAnalytics} disabled={analyticsLoading}>
              {analyticsLoading ? 'Loading…' : '↺ Refresh'}
            </button>
            {(fromDate || toDate) && (
              <button className="toggle-btn" onClick={() => { setFromDate(''); setToDate(''); }}>Clear Filter</button>
            )}
          </div>

          {analyticsLoading && (
            <div style={{ textAlign: 'center', padding: '4rem', color: 'var(--text3)' }}>Loading analytics…</div>
          )}

          {!analyticsLoading && analyticsData.length === 0 && (
            <div style={{ textAlign: 'center', padding: '4rem', color: 'var(--text3)' }}>
              No data available. Try adjusting the date range.
            </div>
          )}

          {!analyticsLoading && analyticsData.map((s, i) => {
            const pct = s.attendance_pct;
            const barColor = pct >= 75 ? 'var(--emerald)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
            const pctClass = pct >= 75 ? 'pct-high' : pct >= 50 ? 'pct-mid' : 'pct-low';
            const initials = s.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
            const isExpanded = expandedStudent === s.id;

            return (
              <div className="student-analytics-card" key={s.id} style={{ animationDelay: `${i * 60}ms` }}>
                <div className="sac-header">
                  <div className="sac-info">
                    <div className="sac-avatar">{initials}</div>
                    <div>
                      <div className="sac-name">{s.name}</div>
                      <div className="sac-meta">{s.roll} · Div {s.division} · {s.email}</div>
                    </div>
                  </div>
                  <div className="sac-stats">
                    <div className="sac-stat">
                      <div className={`sac-stat-val ${pctClass}`}>{pct}%</div>
                      <div className="sac-stat-lbl">Attendance</div>
                    </div>
                    <div className="sac-stat">
                      <div className="sac-stat-val" style={{ color: 'var(--indigo)' }}>{s.present_days}</div>
                      <div className="sac-stat-lbl">Present</div>
                    </div>
                    <div className="sac-stat">
                      <div className="sac-stat-val" style={{ color: 'var(--text2)' }}>{s.total_days}</div>
                      <div className="sac-stat-lbl">Total Days</div>
                    </div>
                    <button className="toggle-btn" onClick={() => setExpandedStudent(isExpanded ? null : s.id)}>
                      {isExpanded ? 'Hide Records ▲' : 'View Records ▼'}
                    </button>
                    <button className="btn-dl" onClick={() => downloadPDF(s, null)} style={{ padding: '5px 12px', fontSize: '0.75rem' }}>↓ PDF</button>
                  </div>
                </div>

                {/* CSS Bar Chart */}
                <div className="sac-bar-wrap">
                  <div className="sac-bar-track">
                    <div className="sac-bar-fill" style={{ width: `${pct}%`, background: barColor }} />
                  </div>
                  <div className="sac-bar-label">
                    <span>{s.present_days} days present</span>
                    <span>Last seen: {s.last_seen || '—'}</span>
                  </div>
                </div>

                {/* Expandable Records */}
                {isExpanded && s.records && s.records.length > 0 && (
                  <div className="sac-records">
                    <div className="sac-record-row header">
                      <span>Date</span><span>Status</span><span>Check In</span><span>Check Out</span>
                    </div>
                    {s.records.map((r, ri) => (
                      <div className="sac-record-row" key={ri}>
                        <span style={{ fontFamily: 'var(--mono)' }}>{r.date}</span>
                        <span style={{ color: r.status === 'COMPLETED' ? 'var(--emerald)' : r.status === 'IN' ? 'var(--indigo)' : 'var(--red)', fontWeight: 600 }}>{r.status}</span>
                        <span style={{ fontFamily: 'var(--mono)', color: 'var(--text2)' }}>{r.time_in}</span>
                        <span style={{ fontFamily: 'var(--mono)', color: 'var(--text2)' }}>{r.time_out}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {selected && (
        <StudentModal
          s={selected.s}
          rec={selected.rec}
          exitHistory={selectedHistory.exitHistory}
          geofenceHistory={selectedHistory.geofenceHistory}
          loadingHistory={selectedHistory.loading}
          onClose={() => {
            setSelected(null);
            setSelectedHistory({ loading: false, exitHistory: [], geofenceHistory: [] });
          }}
        />
      )}
      <ToastContainer toasts={toasts} removeToast={removeToast} />
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(() => {
    try { const s = sessionStorage.getItem("kiwi_live_session"); return s ? JSON.parse(s) : null; }
    catch { return null; }
  });
  return session
    ? <Dashboard session={session} onLogout={() => { setSession(null); sessionStorage.removeItem("kiwi_live_session"); }} />
    : <LoginPage onLogin={data => { setSession(data); sessionStorage.setItem("kiwi_live_session", JSON.stringify(data)); }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
